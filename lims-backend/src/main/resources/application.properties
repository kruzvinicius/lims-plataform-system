### Application Info
spring.application.name=lims-backend
spring.profiles.active=dev


### Flyway - Database Migration (The Boss)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
logging.level.org.flywaydb=DEBUG

### JPA / Hibernate Configuration
# 'validate' ensures that the Java code matches the Flyway scripts
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

### Hibernate Envers - Audit Trail Settings
# Matching your specific audit naming convention
spring.jpa.properties.hibernate.envers.audit_table_suffix=_aud
spring.jpa.properties.hibernate.envers.revision_field_name=rev_id

### Swagger / OpenAPI Documentation
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

JWT_SECRET=QWxhZGRpbjpPcGVuU2VzYW1lU3VwZXJTZWNyZXRLZXk=

### Email Notifications (disabled by default — configure SMTP to enable)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

### LIMS Notification Settings
lims.notifications.enabled=${LIMS_NOTIFICATIONS_ENABLED:false}