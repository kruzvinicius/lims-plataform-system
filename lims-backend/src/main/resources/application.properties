### Application Configuration
spring.application.name=lims-backend

### Database Connection Configuration
# Using port 5435 as defined in docker-compose.yml
spring.datasource.url=jdbc:postgresql://localhost:5435/lims_db
spring.datasource.username=admin
spring.datasource.password=${DB_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

### JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

### Hibernate Envers - Audit Trail Settings
# Use suffix for audit table names (e.g., samples_aud)
spring.jpa.properties.hibernate.envers.audit_table_suffix=_aud

# Set the custom revision ID column name in all audit tables
spring.jpa.properties.hibernate.envers.revision_field_name=rev_id

# Set the custom revision type column name in all audit tables
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method