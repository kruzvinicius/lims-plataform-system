### Application Info
spring.application.name=lims-backend
spring.profiles.active=dev


### Flyway - Database Migration (The Boss)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
logging.level.org.flywaydb=DEBUG

### JPA / Hibernate Configuration
# 'validate' ensures that the Java code matches the Flyway scripts
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

### Hibernate Envers - Audit Trail Settings
# Matching your specific audit naming convention
spring.jpa.properties.hibernate.envers.audit_table_suffix=_aud
spring.jpa.properties.hibernate.envers.revision_field_name=rev_id

### Swagger / OpenAPI Documentation
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

