version: '3.8'
services:
  db:
    image: postgres:15
    container_name: lims-postgres
    restart: always
    environment:
      POSTGRES_DB: lims_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5435:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data