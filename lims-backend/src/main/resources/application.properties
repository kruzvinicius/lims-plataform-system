### Application Info
spring.application.name=lims-backend

### Database Connection (Port 5435 via Docker)
spring.datasource.url=jdbc:postgresql://localhost:5435/lims_db
spring.datasource.username=admin
spring.datasource.password=${DB_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

### Flyway - Database Migration (The Boss)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

### JPA / Hibernate Configuration
# 'validate' ensures that the Java code matches the Flyway scripts
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

### Hibernate Envers - Audit Trail Settings
# Matching your specific audit naming convention
spring.jpa.properties.hibernate.envers.audit_table_suffix=_aud
spring.jpa.properties.hibernate.envers.revision_field_name=rev_id

### Swagger / OpenAPI Documentation
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method