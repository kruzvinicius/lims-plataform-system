version: '3.8'

services:
  db:
    image: postgres:15
    container_name: lims-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lims_db}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
    - ./lims-database/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-lims_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: lims-network